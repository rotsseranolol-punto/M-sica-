<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encuesta</title>

<style>

body{
font-family:Arial;
background:#05091f;
color:white;
padding:30px;
}

.contenedor{
background:#0d1335;
padding:30px;
border-radius:15px;
max-width:700px;
margin:auto;
}

h1{
text-align:center;
color:#b56cff;
}

label{
display:block;
margin:15px 0;
font-size:18px;
}

button{
background:#8f45ff;
color:white;
border:none;
padding:12px 25px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#a86cff;
}

</style>

</head>

<body>

<div class="contenedor">

<h1>📊 Encuesta</h1>

<h2>¿Cuál es tu artista favorito?</h2>

<form>

<label>
<input type="radio" name="artista">
Ñengo Flow
</label>

<label>
<input type="radio" name="artista">
Myke Towers
</label>

<label>
<input type="radio" name="artista">
Eladio Carrión
</label>

<label>
<input type="radio" name="artista">
Dei V
</label>

<label>
<input type="radio" name="artista">
Amenazzy
</label>

<label>
<input type="radio" name="artista">

<br>

</form>

</div>

</body>
</html>
